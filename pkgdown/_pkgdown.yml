url: https://chop-cgtinformatics.github.io/REDCapExploreR/

home:
  title: Exploratory Data Quality Tools for REDCap Projects

template:
  bootstrap: 5
  bslib:
    code_font: {google: "Fira Code"}
    primary: "#b22228"
    text-muted: "#FFFFFF"

navbar:
  bg: primary
  structure:
    left:  [intro, reference, articles]
    right: [search, github]
  left:
    - icon: fa-home
      href: index.html
      aria-label: Home
    - text: Get Started
      href: articles/REDCapExploreR.html
    - text: Reference
      href: reference/index.html
    - text: Articles
      menu:
      - text: "Understanding Quality Report Outputs"
        desc: "Navigate findings, summaries, metadata, and assumptions"
        href: articles/quality-report.html

search:
  exclude: ['news/index.html', 'AGENTS.html']

reference:
- title: "Pull REDCap Data"
  desc: >
    Retrieve REDCap project data and metadata from the API.
  contents:
  - pull_redcap_project
- title: "Build Codebooks"
  desc: >
    Build and view REDCap project codebooks.
  contents:
  - build_codebook
  - save_codebook
  - view_codebook
- title: "Build Quality Reports"
  desc: >
    Build exploratory REDCap data quality reports.
  contents:
  - build_quality_report
- title: "Record Status Dashboard"
  desc: >
    Recreate and plot REDCap Record Status Dashboard data.
  contents:
  - build_record_status_data
  - plot_record_status
- title: "Data"
  desc: >
    Synthetic REDCap-shaped datasets for examples and documentation.
  contents:
  - mock_redcap_project
  - mock_record_status_data
  - mock_codebook
  - mock_quality_report
